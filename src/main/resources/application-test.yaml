server:
  port: 8081

spring:
  datasource:
    url: jdbc:h2:mem:biblioteca_test;DB_CLOSE_DELAY=-1;MODE=MSSQLServer
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop # Crea las tablas al empezar el test y las borra al finalizar
    show-sql: true